name: Auto PR on branch push
on:
  push:
    branches:
      - 'feat/**'
      - 'docs/**'
      - 'chore/**'
permissions:
  contents: read
  pull-requests: write
jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Determine base branch
        id: base
        uses: actions/github-script@v7
        with:
          script: |
            const {data:{default_branch}} = await github.rest.repos.get(context.repo);
            core.setOutput('base', default_branch);
      - name: Create PR if none exists
        uses: actions/github-script@v7
        with:
          script: |
            const {owner, repo} = context.repo;
            const head = context.ref.replace('refs/heads/',''); // branch name
            const base = '${{ steps.base.outputs.base }}';
            const prs = await github.rest.pulls.list({ owner, repo, head: `${owner}:${head}`, state: 'open' });
            if (prs.data.length) {
              core.info(`PR already open: ${prs.data[0].html_url}`);
              return;
            }
            const title = `auto: open PR for ${head}`;
            const body = `Auto-opened PR for branch \`${head}\` into \`${base}\`.`;
            const pr = await github.rest.pulls.create({ owner, repo, head, base, title, body });
            core.info(`Created PR: ${pr.data.html_url}`);
